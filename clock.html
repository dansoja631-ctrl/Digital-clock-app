<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Digital Clock</title>
<link rel="stylesheet" href="clock.css">
</head>
<body>

<div class="container">

<h1>Mustapha Digital Clock</h1>

<div class="clock-box">

<div id="date"></div>

🌙 Theme
</button>

</div>

</div>

</div>

<script src="clock.js"></script>

</body>
</html>
